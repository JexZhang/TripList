<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <rect width="200" height="280" fill="#FFF7EC"/>
  
  <!-- AI Banner（简化） -->
  <rect x="14" y="16" width="172" height="40" rx="10" fill="#FF9A4D" opacity="0.15" stroke="#FF9A4D" stroke-width="1"/>
  <circle cx="32" cy="36" r="8" fill="#FF9A4D" opacity="0.8"/>
  <text x="46" y="34" font-family="sans-serif" font-size="9" fill="#E68A45" font-weight="600">AI 规划行程</text>
  <text x="172" y="38" font-family="sans-serif" font-size="12" fill="#E68A45">›</text>
  
  <!-- 精选攻略标题 -->
  <text x="14" y="78" font-family="serif" font-size="10" fill="#8B7250" font-weight="600">精选攻略</text>
  
  <!-- 横滑卡片（部分） -->
  <rect x="14" y="86" width="70" height="42" rx="6" fill="#FFFFFF" stroke="#E6D6BA" stroke-width="1"/>
  <text x="20" y="102" font-family="sans-serif" font-size="8" fill="#8B7250" font-weight="600">京都赏樱</text>
  <text x="20" y="112" font-family="sans-serif" font-size="7" fill="#C9B58E">京都 · 3天</text>
  
  <rect x="90" y="86" width="70" height="42" rx="6" fill="#FFFFFF" stroke="#E6D6BA" stroke-width="1"/>
  <text x="96" y="102" font-family="sans-serif" font-size="8" fill="#8B7250" font-weight="600">东京美食</text>
  <text x="96" y="112" font-family="sans-serif" font-size="7" fill="#C9B58E">东京 · 4天</text>
  
  <!-- 分隔线 -->
  <line x1="14" y1="142" x2="186" y2="142" stroke="#E6D6BA" stroke-width="0.8"/>
  
  <!-- 进行中行程标题 -->
  <text x="14" y="158" font-family="serif" font-size="10" fill="#8B7250" font-weight="600">进行中</text>
  
  <!-- 行程卡片 -->
  <rect x="14" y="166" width="172" height="52" rx="8" fill="#FFFFFF" stroke="#E6D6BA" stroke-width="1.2"/>
  <rect x="22" y="174" width="40" height="36" rx="5" fill="#F5F0E5"/>
  <text x="70" y="186" font-family="sans-serif" font-size="9" fill="#8B7250" font-weight="600">大理慢生活</text>
  <text x="70" y="196" font-family="sans-serif" font-size="7" fill="#C9B58E">云南 · 5天</text>
  <rect x="70" y="202" width="34" height="12" rx="6" fill="#FF9A4D" opacity="0.2"/>
  <text x="75" y="211" font-family="sans-serif" font-size="7" fill="#E68A45">进行中</text>
  
  <!-- 底注 -->
  <text x="100" y="272" font-family="serif" font-size="9" fill="#8B7250" text-anchor="middle" letter-spacing="3">TEGAMI</text>
</svg>
