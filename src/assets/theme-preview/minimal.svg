<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <rect width="200" height="280" fill="#FAFAF8"/>
  
  <!-- AI Banner（简化） -->
  <rect x="14" y="16" width="172" height="40" rx="10" fill="#111" opacity="0.08" stroke="#111" stroke-width="1"/>
  <circle cx="32" cy="36" r="8" fill="#111" opacity="0.8"/>
  <text x="46" y="34" font-family="sans-serif" font-size="9" fill="#111" font-weight="600">AI 规划行程</text>
  <text x="172" y="38" font-family="sans-serif" font-size="12" fill="#111">›</text>
  
  <!-- eyebrow -->
  <text x="20" y="78" font-family="monospace" font-size="7" fill="#888" letter-spacing="6">XING CE · 2026</text>
  
  <!-- 3 极小数字 -->
  <text x="20" y="110" font-family="serif" font-weight="700" font-size="18" fill="#111">04</text>
  <text x="20" y="126" font-family="monospace" font-size="7" fill="#888" letter-spacing="3">天</text>
  <text x="76" y="110" font-family="serif" font-weight="700" font-size="18" fill="#111">¥3,840</text>
  <text x="76" y="126" font-family="monospace" font-size="7" fill="#888" letter-spacing="3">人均</text>
  
  <!-- 2 条 hairline 行（简化） -->
  <line x1="20" y1="152" x2="180" y2="152" stroke="#DDD" stroke-width="0.5"/>
  <text x="20" y="168" font-family="serif" font-size="9" fill="#111">01 · 行程</text>
  <text x="180" y="168" font-family="monospace" font-size="8" fill="#888" text-anchor="end">P.02</text>
  
  <line x1="20" y1="180" x2="180" y2="180" stroke="#DDD" stroke-width="0.5"/>
  <text x="20" y="196" font-family="serif" font-size="9" fill="#111">02 · 开销</text>
  <text x="180" y="196" font-family="monospace" font-size="8" fill="#888" text-anchor="end">P.08</text>
  
  <!-- 底注 -->
  <text x="100" y="264" font-family="monospace" font-size="8" fill="#888" text-anchor="middle" letter-spacing="6">MINIMAL</text>
</svg>
