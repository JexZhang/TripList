<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <!-- 牛皮纸纹底 -->
  <rect width="200" height="280" fill="#EFE6D5"/>
  <g opacity="0.18" fill="#9C7A4A">
    <rect x="0"  y="0"   width="200" height="2"/>
    <rect x="0"  y="40"  width="200" height="2"/>
    <rect x="0"  y="80"  width="200" height="2"/>
    <rect x="0"  y="120" width="200" height="2"/>
    <rect x="0"  y="160" width="200" height="2"/>
    <rect x="0"  y="200" width="200" height="2"/>
    <rect x="0"  y="240" width="200" height="2"/>
  </g>
  
  <!-- AI Banner（简化） -->
  <rect x="14" y="16" width="172" height="40" rx="10" fill="#7C5E33" opacity="0.12" stroke="#7C5E33" stroke-width="1"/>
  <circle cx="32" cy="36" r="8" fill="#7C5E33" opacity="0.8"/>
  <text x="46" y="34" font-family="sans-serif" font-size="9" fill="#6B4E28" font-weight="600">AI 规划行程</text>
  <text x="172" y="38" font-family="sans-serif" font-size="12" fill="#7C5E33">›</text>
  
  <!-- 上方虚线 -->
  <line x1="14" y1="70" x2="186" y2="70" stroke="#7C5E33" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="14" y="86" font-family="serif" font-size="9" fill="#7C5E33" letter-spacing="4">POSTCARD · 2026</text>
  
  <!-- 椭圆戳 1 -->
  <g transform="translate(50 120) rotate(-8)">
    <ellipse cx="0" cy="0" rx="28" ry="18" fill="none" stroke="#7C5E33" stroke-width="1.8"/>
    <text font-family="serif" font-size="9" fill="#7C5E33" text-anchor="middle" dy="-2">入境</text>
    <text font-family="monospace" font-size="6" fill="#7C5E33" text-anchor="middle" dy="8" letter-spacing="2">10.01</text>
  </g>
  
  <!-- 椭圆戳 2 -->
  <g transform="translate(120 150) rotate(6)">
    <ellipse cx="0" cy="0" rx="30" ry="18" fill="none" stroke="#9C7A4A" stroke-width="1.8"/>
    <text font-family="serif" font-size="9" fill="#9C7A4A" text-anchor="middle" dy="-2">游览</text>
    <text font-family="monospace" font-size="6" fill="#9C7A4A" text-anchor="middle" dy="8" letter-spacing="2">10.03</text>
  </g>
  
  <!-- 下方虚线 -->
  <line x1="14" y1="236" x2="186" y2="236" stroke="#7C5E33" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="100" y="264" font-family="serif" font-size="9" fill="#7C5E33" text-anchor="middle" letter-spacing="3">POSTCARD</text>
</svg>
