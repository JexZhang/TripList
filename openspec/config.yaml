schema: spec-driven

project:
  name: 行册
  description: >
    基于 Taro 框架的跨平台旅行管理小程序，提供旅行攻略浏览、开销预算统计、行李打包清单整理三大核心功能，采用静态 JSON 数据源 + 本地 Storage 覆盖方案，支持 9 个目标平台离线使用。
  tech_stack:
    frontend: React 18.0.0 + TypeScript 5.4.5 + Taro 4.2.0 + SCSS
    build: Webpack 5.91.0 + Babel 7.24.4 + npm + Husky 9.1.7 + Commitlint 19.8.1 + Stylelint 16.4.0
    database: Taro Storage API（本地持久化，无服务端数据库）
  conventions:
    - 基线不可变 + 覆盖可编辑：trips.json 作为只读数据源，用户修改通过 override 层（Taro Storage）叠加，不直接修改基线。来源：[trip-core §4](openspec/specs/trip-core/spec.md)、[override-utils §4](openspec/specs/override-utils/spec.md)
    - 元组数据结构：打包清单使用 [string, string] 二元组而非对象 { categoryId, name }，JSON 序列化时减少约 30% 字符数。来源：[packing-data §1](openspec/specs/packing-data/spec.md)、[packing-data §5](openspec/specs/packing-data/spec.md)
    - 分层配置合并：config/index.ts 采用"基础配置 + 环境配置"分层策略，通过 NODE_ENV 判断并使用 merge() 深度合并。来源：[project-config §4](openspec/specs/project-config/spec.md)
    - 防御性数据加载：loadOverride() 通过三层防御机制（读取 → typeof 守卫 → 合并默认值）确保永远返回可用数据。来源：[override-utils §4](openspec/specs/override-utils/spec.md)、[override-utils §5](openspec/specs/override-utils/spec.md)

rules:
  proposal:
    - 跨层改动时必须列出数据层（src/data/）、工具层（src/utils/）、页面层（src/pages/）、配置层（config/）的影响点
    - 新增类型定义（src/types/trip.ts 或 src/utils/override.ts 中的接口）时必须附证据链引用（哪个 spec 的哪个 Requirement 需要）
  tasks:
    - 未覆盖文件处理：所有 23 个文件均已被 4 个 spec 覆盖，无未覆盖文件
    - 质量门禁：按 phase 拆分、每个 phase 末尾运行 lint（npx stylelint "src/**/*.scss" 和 npx eslint "src/**/*.{ts,tsx}"）
    - 协议变更需端到端测试：修改 TripOverride 接口或 trips.json 结构时，需验证 loadOverride/saveOverride 的向后兼容性
